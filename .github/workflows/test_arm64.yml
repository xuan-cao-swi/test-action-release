name: Verify Installation

on:
  workflow_dispatch:


jobs:

  all_amd64_verify_install_test:
    name: ruby - ${{ matrix.os }} on amd64
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        os: [3.1.3-bullseye, 3.1.3-alpine3.17, 2.7.7-bullseye, 2.7.7-alpine3.16]

    container:
      image: ruby:${{ matrix.os }}

    steps:
      - uses: actions/checkout@v2
      - name: Setup and run install test
        working-directory: .github/workflows/
        run: |
          sleep 1
          apt update
          apt install -y ruby ruby-dev libssl-dev libreadline-dev zlib1g-dev autoconf bison build-essential libyaml-dev libreadline-dev libncurses5-dev libffi-dev libgdbm-dev
          gem install solarwinds_apm
          ruby ./scripts/test_install.rb

  all_arm64_verify_install_test:
    name: ruby - ${{ matrix.os }} on arm64
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        os: [bullseye, ubuntu20.04, ubuntu22.04, alpine_latest]

    steps:
      - uses: actions/checkout@v2
      - uses: uraimo/run-on-arch-action@v2
        name: Verify Install
        with:
          arch: aarch64
          distro: ${{ matrix.os }}
          run: |
            sleep 1
            apt update
            apt install -y ruby ruby-dev libssl-dev libreadline-dev zlib1g-dev autoconf bison build-essential libyaml-dev libreadline-dev libncurses5-dev libffi-dev libgdbm-dev
            ruby -v
            gem install solarwinds_apm
            ruby ./.github/workflows/scripts/verify_install.rb









