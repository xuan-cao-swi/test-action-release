  debian_arm64_verify_install_test:
    name: ruby - ${{ matrix.os }} on arm64
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        os: [bullseye, ubuntu20.04, ubuntu22.04]

    steps:
      - uses: actions/checkout@v2
      - uses: uraimo/run-on-arch-action@v2
        name: Verify Install
        with:
          arch: aarch64
          distro: ${{ matrix.os }}
          run: |
            cd .github/workflows/ && ./scripts/_helper_run_install_tests.sh
          shell: sh
          env: |
            MODE: ${{ github.event.inputs.install-registry }}
            ARITCH: ARM
            SOLARWINDS_APM_VERSION: ${{ github.event.inputs.solarwinds-version }}
            

